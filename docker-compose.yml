services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=get@servd.pro
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt/acme.json:/letsencrypt/acme.json
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.servd.pro`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal

  app:
    build:
      context: ./app
    container_name: servd-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-servd}:${POSTGRES_PASSWORD:-servdpassword}@postgres:5432/${POSTGRES_DB:-servd}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    depends_on:
      - postgres
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`get.servd.pro`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.services.app.loadbalancer.server.port=3000

  postgres:
    image: postgres:16-alpine
    container_name: servd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-servd}
      POSTGRES_USER: ${POSTGRES_USER:-servd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servdpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
